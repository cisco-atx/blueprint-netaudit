{% extends "atx.home.html" %}

{% block sidebar %}

<!-- Sidebar Stylesheet -->
<link
        rel="stylesheet"
        id="theme-stylesheet"
        href="{{ url_for('netaudit.static', filename='css/common.css') }}"
>

<!-- ========================= -->
<!-- Main Navigation Section -->
<!-- ========================= -->
<nav>

    <!-- Dashboard Menu Item -->
    <div class="menu-item" data-href="{{ url_for('netaudit.render_dashboard') }}">
        <span class="material-icons">dashboard</span>
        <span>Dashboard</span>
    </div>

    <!-- Results Menu Item -->
    <div class="menu-item" data-href="{{ url_for('netaudit.render_results_for_views') }}">
        <span class="material-icons">layers</span>
        <span>Results</span>
    </div>

    <!-- Quick Audit Menu Item -->
    <div class="menu-item" data-href="{{ url_for('netaudit.render_quickaudit') }}">
        <span class="material-icons">bolt</span>
        <span>Quick Audit</span>
    </div>

    <!-- Divider for Admin Section -->
    <hr class="admin-only" style="margin-top: 6px; margin-bottom: 6px;">

    <!-- ========================= -->
    <!-- Admin Navigation Section -->
    <!-- ========================= -->

    <!-- Views Management -->
    <div class="menu-item admin-only" data-href="{{ url_for('netaudit.render_manage_views') }}">
        <span class="material-icons">view_list</span>
        <span>Views</span>
    </div>

    <!-- Devices Management -->
    <div class="menu-item admin-only" data-href="{{ url_for('netaudit.render_manage_devices') }}">
        <span class="material-icons">devices</span>
        <span>Devices</span>
    </div>

    <!-- Checks Management -->
    <div class="menu-item admin-only" data-href="{{ url_for('netaudit.render_manage_checks') }}">
        <span class="material-icons">checklist</span>
        <span>Checks</span>
    </div>

    <!-- Connectors Management -->
    <div class="menu-item admin-only" data-href="{{ url_for('netaudit.render_manage_connectors') }}">
        <span class="material-icons">account_tree</span>
        <span>Connectors</span>
    </div>

</nav>

{% endblock %}
